<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mira tu vicio de canciones 🎧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Pantalla de Pregunta Inicial -->
    <div id="gate-overlay">
        <div class="gate-content">
            <h2 class="gate-question">¿Quieres averiguar tus canciones más escuchadas?</h2>
            <div id="gate-cage" class="gate-btns">
                <button id="btn-si" class="btn-gate">SÍ</button>
                <button id="btn-no" class="btn-gate secondary">NO</button>
            </div>
        </div>
    </div>

    <div id="three-container"></div>

    <div class="scroll-wrapper" id="app-content" style="opacity: 0; pointer-events: none;">
        <!-- SECCIÓN 1: El Inicio Zen -->
        <section class="section hero-section" id="hero">
            <div class="hero-content">
                <h1 class="glitch-text">MIRA TU<br>VICIO DE<br>CANCIONES</h1>
                <p class="hero-subtitle">Vibra con la frecuencia de tu alma.</p>
                <div id="hero-login-area">
                    <button id="login-btn-hero" class="btn-login-hero">EXPLORAR FRECUENCIAS</button>
                    <p class="login-subtext">Tu viaje auditivo comienza aquí.</p>
                </div>
                <p class="scroll-hint">Desliza para ver tus ondas <i class="fas fa-chevron-down"></i></p>
            </div>
        </section>

        <!-- SECCIÓN 2: La Lista Minimalista -->
        <section class="section list-section" id="list-view">
            <div class="content-pod">
                <header class="pod-nav">
                    <div class="pod-titles">
                        <h1 id="hero-title">¡Hola!</h1>
                        <p class="pod-subtitle" id="dynamic-compliment">¡Sabía que tenías buen gusto!</p>
                    </div>
                    <div class="user-area">
                        <img src="" alt="User" id="user-avatar" style="display:none;">
                    </div>
                </header>

                <div class="pod-body">
                    <div class="filters">
                        <button class="filter-btn active" data-range="short_term">Reciente</button>
                        <button class="filter-btn" data-range="medium_term">Mis Vibes</button>
                        <button class="filter-btn" data-range="long_term">Eternas</button>
                    </div>
                    <div class="song-list" id="song-list">
                        <!-- Canciones -->
                    </div>
                </div>

                <div class="search-pod-bottom">
                    <div class="search-wrap">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Busca un nuevo ritmo...">
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Player Fijo -->
    <footer class="minimal-player" id="player-bar">
        <div class="player-inner">
            <div class="track-info">
                <img src="" alt="" id="current-album-art">
                <div class="text">
                    <h4 id="current-title">Sintonizando...</h4>
                    <p id="current-artist">Selecciona un canal</p>
                    <small id="player-comment" style="color: var(--primary); font-size: 0.6rem; display: block; margin-top: 2px;"></small>
                </div>
            </div>
            <button class="play-pause-btn"><i class="fas fa-play"></i></button>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
